# Cloudflare Workers 배포 설정
# 자세한 내용: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "team-claude-billing"
main = "src/index.ts"
compatibility_date = "2026-04-29"

# Workers KV — 입금 상태 저장소
# 최초 1회 생성 명령:
#   npx wrangler kv:namespace create DEPOSITS_KV
# 생성 후 출력되는 id를 아래에 붙여넣으세요.
[[kv_namespaces]]
binding = "DEPOSITS_KV"
id = "c009f42b5477438988a573d43dfb5883"

# 환경 변수 (비밀이 아닌 값만)
[vars]
TIMEZONE = "Asia/Seoul"
MEMBERS_COUNT = "5"

# 비밀 값은 wrangler secret으로 등록:
#   npx wrangler secret put DISCORD_PUBLIC_KEY
#   npx wrangler secret put DISCORD_BOT_TOKEN
#   npx wrangler secret put DISCORD_APP_ID
